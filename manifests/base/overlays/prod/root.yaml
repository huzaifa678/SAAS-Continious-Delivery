apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-root-prod
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/huzaifa678/SAAS-Continious-Delivery.git
    targetRevision: main
    path: manifests/base/overlays/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
