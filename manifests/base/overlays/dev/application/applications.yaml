# ─────────────────────────────────────────────────────────────────────────────
# DEV — ArgoCD Applications
# Each microservice is deployed from its own ECR-hosted Helm chart.
# Chart versions are pinned here; change of helm manifests and updating to new version is possible.
# valueFiles are loaded from Git so env-specific overrides stay in source control.
# ─────────────────────────────────────────────────────────────────────────────

# API Gateway (saas-chart) — deployed from Git path (contains otel + gateway CRDs)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: api-gateway-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/refresh: hard
spec:
  project: default
  source:
    repoURL: https://github.com/huzaifa678/SAAS-Continious-Delivery.git
    targetRevision: main
    path: saas-chart
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: saas-apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - FailOnSharedResource=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: ""
      kind: Service
      jsonPointers:
        - /spec/clusterIP
---
# Auth Service — pulled from ECR OCI registry
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth-service-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  sources:
    # Chart from ECR (OCI)
    - repoURL: oci://123456789.dkr.ecr.us-east-1.amazonaws.com/helm
      chart: auth-service
      targetRevision: 0.1.0   
      helm:
        releaseName: auth-service
        valueFiles:
          # Values loaded from Git ref (requires ArgoCD multi-source)
          - $values/charts/auth-service/values.yaml
          - $values/charts/auth-service/values-dev.yaml
    # Git ref for valueFiles
    - repoURL: https://github.com/huzaifa678/SAAS-Continious-Delivery.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: saas-apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
