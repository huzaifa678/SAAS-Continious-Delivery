apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: airflow
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default

  source:
    repoURL: https://github.com/YOUR_REPO.git
    targetRevision: main
    path: airflow
    helm:
      releaseName: airflow
      valueFiles:
        - values.yaml
      parameters:
        - name: airflow.executor
          value: CeleryExecutor

  destination:
    server: https://kubernetes.default.svc
    namespace: airflow

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true