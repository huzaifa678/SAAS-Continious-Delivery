apiVersion: v1
kind: Namespace
metadata:
  name: keycloak
  labels:
    cert-manager.io/disable-validation: "true"
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-keycloak
spec:
  acme:
    email: huzaifagill411@gmail.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-keycloak-private-key
    solvers:
      - dns01:
          route53:
            region: us-east-1
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: keycloak-tls
  namespace: keycloak
spec:
  secretName: keycloak-tls
  issuerRef:
    name: letsencrypt-keycloak
    kind: ClusterIssuer
  dnsNames:
    - keycloak.saas.internal
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: keycloak-gateway
  namespace: keycloak
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-keycloak
spec:
  gatewayClassName: nginx
  listeners:
    - name: https
      port: 443
      protocol: HTTPS
      hostname: keycloak.saas.internal
      tls:
        mode: Terminate
        certificateRefs:
          - name: keycloak-tls
            kind: Secret
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: keycloak
spec:
  parentRefs:
    - name: keycloak-gateway
  hostnames:
    - keycloak.saas.internal
  rules:
    - backendRefs:
        - name: keycloak
          port: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-gateway-lb
  namespace: keycloak
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  selector:
    gateway.networking.k8s.io/gateway-name: keycloak-gateway
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP
