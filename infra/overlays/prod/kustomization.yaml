apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prod keycloak-helm is managed by Terraform (injects RDS endpoint).
# Prod karpenter/cert-manager/external-dns/external-secrets are also Terraform-managed (IRSA ARNs injected).
# This overlay only includes: shared airflow + prod-specific keycloak gateway + karpenter nodepool.

resources:
  - ../../base/airflow/airflow.yaml
  - ../../base/airflow/deployment.yaml
  - ../../base/airflow/service.yaml
  - keycloak/keycloak-gateway.yaml
  - karpenter/nodepool.yaml
