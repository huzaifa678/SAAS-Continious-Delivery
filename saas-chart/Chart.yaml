apiVersion: v2
name: saas-chart
description: API Gateway Helm chart — routes traffic to microservices
type: application
version: 0.2.0
appVersion: "1.0.0"

# OpenTelemetry collector is bundled with the gateway chart.
# Microservices (auth, billing, subscription, usage) are deployed
# as independent charts from ECR — see ArgoCD Applications.
dependencies:
  - name: opentelemetry-collector
    version: 0.100.0
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
    condition: opentelemetry-collector.enabled
