global:
  environment: dev   #default config

opentelemetry-collector:
  mode: daemonset

  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch: {}

      resource:
        attributes:
          - key: service.name
            from_attribute: service.name
            action: insert

      {{- if eq .Values.global.environment "staging" }}
      transform/logs:
        log_statements:
          - context: log
            statements:
              - set(attributes["message"], body)
              - set(attributes["log.level"], severity_text)
              - set(attributes["service.name"], resource.attributes["service.name"])
              - set(attributes["event.dataset"], "application")
      {{- end }}

    exporters:

      {{- if eq .Values.global.environment "staging" }}

      otlp/elastic:
        endpoint: http://apm-server:8200
        tls:
          insecure: true

      elasticsearch:
        endpoints: ["http://elasticsearch:9200"]
        logs_index: "otel-logs"
        tls:
          insecure: true

      otlphttp/logstash:
        endpoint: http://logstash:5000

      prometheus:
        endpoint: "0.0.0.0:8889"

      {{- else }}

      otlp/tempo:
        endpoint: tempo:4317
        tls:
          insecure: true

      otlphttp/loki:
        endpoint: http://loki:3100/otlp
        tls:
          insecure: true

      debug:
        verbosity: detailed

      prometheus:
        endpoint: localhost:8889

      {{- end }}

    service:
      pipelines:

        traces:
          receivers: [otlp]
          processors: [resource, batch]
          exporters:
            {{- if eq .Values.global.environment "staging" }}
            [otlp/elastic]
            {{- else }}
            [otlp/tempo]
            {{- end }}

        metrics:
          receivers: [otlp]
          processors: [resource, batch]
          exporters: [prometheus]

        logs:
          receivers: [otlp]
          processors:
            {{- if eq .Values.global.environment "staging" }}
            [transform/logs, batch]
            {{- else }}
            [resource, batch]
            {{- end }}
          exporters:
            {{- if eq .Values.global.environment "staging" }}
            [elasticsearch, otlphttp/logstash]
            {{- else }}
            [debug, otlphttp/loki]
            {{- end }}
