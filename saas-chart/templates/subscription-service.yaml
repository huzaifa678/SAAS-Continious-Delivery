apiVersion: apps/v1
kind: Deployment
metadata:
  name: subscription-service
  labels:
    app: subscription-service
spec:
  replicas: {{ .Values.services.subscription.replicas }}
  selector:
    matchLabels:
      app: subscription-service
  template:
    metadata:
      labels:
        app: subscription-service
      {{- if .Values.istio.enabled }}
      annotations:
        sidecar.istio.io/inject: "true"
        {{- if .Values.istio.revision }}
        istio.io/rev: {{ .Values.istio.revision | quote }}
        {{- end }}
      {{- end }}
    spec:
      containers:
      - name: subscription-service
        image: {{ .Values.image.subscription-service }}
        imagePullPolicy: Always
        ports:
        - containerPort: {{ .Values.services.subscription.port }}
          name: http
        - containerPort: 50051
          name: grpc
        livenessProbe:
          httpGet:
            path: {{ .Values.services.subscription.livenessProbe.path }}
            port: {{ .Values.services.subscription.port }}
          initialDelaySeconds: {{ .Values.services.subscription.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.services.subscription.livenessProbe.periodSeconds }}
          failureThreshold: 3
          timeoutSeconds: 1
        readinessProbe:
          httpGet:
            path: {{ .Values.services.subscription.readinessProbe.path }}
            port: {{ .Values.services.subscription.port }}
          initialDelaySeconds: {{ .Values.services.subscription.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.services.subscription.readinessProbe.periodSeconds }}
          failureThreshold: 3
          timeoutSeconds: 1
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.services.subscription.name }}
spec:
  selector:
    app: subscription-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: http
    name: http
  - protocol: TCP
    port: 50051
    targetPort: grpc
    name: grpc
  type: ClusterIP
