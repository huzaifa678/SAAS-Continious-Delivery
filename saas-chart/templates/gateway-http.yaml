apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.appName }}-http-route
spec:
  parentRefs:
    - name: {{ .Values.appName }}-gateway
  hostnames:
    - {{ .Values.domainName.http }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Values.apiService }}
          port: 80