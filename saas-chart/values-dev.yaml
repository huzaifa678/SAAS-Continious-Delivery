global:
  environment: dev

opentelemetry-collector:
  enabled: true
  mode: daemonset

  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch: {}

      resource:
        attributes:
          - key: service.name
            from_attribute: service.name
            action: insert

      {{- if eq .Values.global.environment "staging" }}
      transform/logs:
        log_statements:
          - context: log
            statements:
              - set(attributes["message"], body)
              - set(attributes["log.level"], severity_text)
              - set(attributes["service.name"], resource.attributes["service.name"])
              - set(attributes["event.dataset"], "application")
      {{- end }}

    exporters:

      {{- if eq .Values.global.environment "staging" }}

      otlp/elastic:
        endpoint: http://apm-server:8200
        tls:
          insecure: true

      elasticsearch:
        endpoints: ["http://elasticsearch:9200"]
        logs_index: "otel-logs"
        tls:
          insecure: true

      otlphttp/logstash:
        endpoint: http://logstash:5000

      prometheus:
        endpoint: "0.0.0.0:8889"

      {{- else }}

      otlp/tempo:
        endpoint: tempo:4317
        tls:
          insecure: true

      otlphttp/loki:
        endpoint: http://loki:3100/otlp
        tls:
          insecure: true

      debug:
        verbosity: detailed

      prometheus:
        endpoint: localhost:8889

      {{- end }}

    service:
      pipelines:

        traces:
          receivers: [otlp]
          processors: [resource, batch]
          exporters:
            {{- if eq .Values.global.environment "staging" }}
            [otlp/elastic]
            {{- else }}
            [otlp/tempo]
            {{- end }}

        metrics:
          receivers: [otlp]
          processors: [resource, batch]
          exporters: [prometheus]

        logs:
          receivers: [otlp]
          processors:
            {{- if eq .Values.global.environment "staging" }}
            [transform/logs, batch]
            {{- else }}
            [resource, batch]
            {{- end }}
          exporters:
            {{- if eq .Values.global.environment "staging" }}
            [elasticsearch, otlphttp/logstash]
            {{- else }}
            [debug, otlphttp/loki]
            {{- end }}

istio:
  enabled: true
  revision: ""

layer: auth

appName: saas
gatewayClass: nginx

tlsSecretName:
  http: saas-app-api-tls

gateway:
  nlbTarget: ""

domainName:
  http: ""

apiService: saas-api-service

image:
  apiGateway: "huzaifagill234/api-gateway:dev"
  authService: "huzaifagill234/auth-service:dev"
  subscriptionService: "huzaifagill234/subscription-service:dev"
  billingService: "huzaifagill234/billing-service:dev"
  usageService: "huzaifagill234/usage-service:dev"

apiGateway:
  replicas: 2
  port: 9000
  keycloakJWKSURL: "http://keycloak.keycloak.svc.cluster.local:8080/realms/saas/protocol/openid-connect/certs"
  livenessProbe:
    path: /healthz/live
    initialDelaySeconds: 10
    periodSeconds: 10
  readinessProbe:
    path: /healthz/ready
    initialDelaySeconds: 5
    periodSeconds: 5

services:
  auth:
    name: auth-service
    port: 8080
    replicas: 2
    livenessProbe:
      path: /healthz/live
      initialDelaySeconds: 15
      periodSeconds: 10
    readinessProbe:
      path: /healthz/ready
      initialDelaySeconds: 10
      periodSeconds: 5
  subscription:
    name: subscription-service
    port: 8081
    replicas: 2
    livenessProbe:
      path: /healthz/live
      initialDelaySeconds: 20
      periodSeconds: 10
    readinessProbe:
      path: /healthz/ready
      initialDelaySeconds: 15
      periodSeconds: 5
  billing:
    name: billing-service
    port: 8082
    replicas: 2
    livenessProbe:
      path: /healthz/live
      initialDelaySeconds: 60
      periodSeconds: 10
    readinessProbe:
      path: /healthz/ready
      initialDelaySeconds: 30
      periodSeconds: 5
  usage:
    name: usage-service
    port: 8083
    replicas: 2
    livenessProbe:
      path: /healthz/live
      initialDelaySeconds: 60
      periodSeconds: 10
    readinessProbe:
      path: /healthz/ready
      initialDelaySeconds: 30
      periodSeconds: 5
