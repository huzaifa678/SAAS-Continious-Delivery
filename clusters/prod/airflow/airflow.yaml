apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: airflow
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default

  source:
    repoURL: https://airflow-helm.github.io/charts
    chart: airflow
    targetRevision: "*"
    helm:
      releaseName: airflow
      parameters:
        - name: airflow.executor
          value: CeleryExecutor
        - name: dags.persistence.enabled
          value: "true"
        - name: dags.persistence.size
          value: 2Gi
        - name: logs.persistence.enabled
          value: "true"
        - name: logs.persistence.size
          value: 1Gi
        - name: scheduler.logCleanup.enabled
          value: "false"
        - name: workers.logCleanup.enabled
          value: "false"
        - name: workers.replicas
          value: "1"
        - name: ingress.enabled
          value: "true"
        - name: ingress.className
          value: nginx
        - name: ingress.web.hosts[0].host
          value: airflow.local
        - name: ingress.web.hosts[0].paths[0].path
          value: /
        - name: ingress.web.hosts[0].paths[0].pathType
          value: Prefix

  destination:
    server: https://kubernetes.default.svc
    namespace: airflow

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
