apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: saas-microservices
  namespace: argocd
  annotations:
    argocd.argoproj.io/refresh: hard
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default

  source:
    repoURL: https://github.com/huzaifa678/SAAS-Continious-Delivery.git
    targetRevision: main
    path: saas-chart
    helm:
      valueFiles:
        - values.yaml
        - values-staging.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: saas-apps

  syncPolicy:
    automated:
      prune: true       
      selfHeal: true     
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true               
      - ApplyOutOfSyncOnly=true       
      - FailOnSharedResource=true     

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: ""
      kind: Service
      jsonPointers:
        - /spec/clusterIP